name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install pop with dev extras
        run: python -m pip install -e .[dev]

      - name: Run regression suite
        run: python -m pytest -q tests/test_dev.py tests/test_dreamwave.py tests/test_bachelor.py

      - name: Compile Python sources
        run: python -m compileall pop tests

      - name: CLI help smoke test
        run: python -m pop.cli --help >/dev/null

  package:
    name: package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip build

      - name: Build wheel and sdist
        run: python -m build --sdist --wheel

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pop-dist
          path: dist/*
          if-no-files-found: error

  required-checks:
    name: required-checks
    runs-on: ubuntu-latest
    needs:
      - tests
      - package
    if: ${{ always() }}

    steps:
      - name: Fail if any prerequisite job failed
        env:
          TESTS_RESULT: ${{ needs.tests.result }}
          PACKAGE_RESULT: ${{ needs.package.result }}
        run: |
          echo "tests=${TESTS_RESULT}"
          echo "package=${PACKAGE_RESULT}"
          [[ "${TESTS_RESULT}" == "success" ]]
          [[ "${PACKAGE_RESULT}" == "success" ]]

      - name: Report success
        run: echo "All required CI checks passed."
